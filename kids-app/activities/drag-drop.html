<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Drag &amp; Drop - Kids Islamic Learning</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="prototype-container">
        <div class="mobile-frame">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="icons">
                    <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4" y="4" width="3" height="7" rx="0.5"/><rect x="8" y="2" width="3" height="9" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
                    <svg width="16" height="11" viewBox="0 0 16 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 9.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" stroke="none"/><path d="M4.5 7A5 5 0 0111.5 7" stroke-linecap="round"/><path d="M1.5 4.5A9 9 0 0114.5 4.5" stroke-linecap="round"/></svg>
                    <span style="font-size:12px;font-weight:800">100%</span>
                </div>
            </div>

            <div id="drag-drop" class="screen active">
                <div class="screen-header">
                    <button class="screen-header-back" onclick="showScreen('flashcards')">←</button>
                    <div class="screen-header-title">Match It!</div>
                    <div style="margin-left:auto;font-size:13px;font-weight:800;color:#92400e;">⭐ +5</div>
                </div>
                <div class="screen-content">

                    <!-- Question card -->
                    <div class="drag-drop-question">
                        <div style="font-size:11px;font-weight:900;color:var(--color-primary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Match the letters to their names!</div>
                        <div class="drag-drop-question-text">Drag each letter to the correct box</div>
                    </div>

                    <!-- Drop zones -->
                    <div class="drag-drop-zones">
                        <div class="drop-zone correct">
                            <div class="drop-zone-label">س  means...</div>
                            <div class="drop-zone-slot" style="border-color:var(--color-correct);background:#d1fae5;color:#065f46;">Seen (S)</div>
                        </div>
                        <div class="drop-zone">
                            <div class="drop-zone-label">ش  means...</div>
                            <div class="drop-zone-slot">Drop here</div>
                        </div>
                        <div class="drop-zone">
                            <div class="drop-zone-label">ص  means...</div>
                            <div class="drop-zone-slot">Drop here</div>
                        </div>
                        <div class="drop-zone">
                            <div class="drop-zone-label">ض  means...</div>
                            <div class="drop-zone-slot">Drop here</div>
                        </div>
                    </div>

                    <!-- Drag pool -->
                    <div style="font-size:13px;font-weight:800;color:#374151;margin-bottom:12px;text-align:center;">Tap to place:</div>
                    <div class="drag-items-pool">
                        <div class="drag-item" onclick="placeItem(this, 1)">Sheen (Sh)</div>
                        <div class="drag-item" onclick="placeItem(this, 2)">Saad (S)</div>
                        <div class="drag-item" onclick="placeItem(this, 3)">Daad (D)</div>
                    </div>

                    <!-- Feedback -->
                    <div id="feedback-msg" style="display:none;text-align:center;margin-top:16px;padding:14px;background:#d1fae5;border-radius:20px;border:2.5px solid var(--color-correct);">
                        <div style="font-size:22px;margin-bottom:4px;">🌟</div>
                        <div style="font-size:15px;font-weight:900;color:#065f46;">MashaAllah! +5 Stars!</div>
                    </div>

                    <button class="btn-primary mt-20" onclick="checkAnswers()">Check My Answers! ✅</button>
                    <button class="btn-secondary mt-12" onclick="showScreen('quiz')">Next: Quiz →</button>

                </div>
            </div>
        </div>

        <div class="screen-navigation">
            <div class="nav-title">Navigate Screens</div>
            <select class="nav-dropdown" id="screenSelector" onchange="showScreen(this.value)">
                <optgroup label="🔐 Auth &amp; Onboarding">
                    <option value="login">Login</option>
                    <option value="register">Register</option>
                    <option value="onboarding">Onboarding</option>
                </optgroup>
                <optgroup label="🏠 Dashboard">
                    <option value="dashboard">Dashboard</option>
                    <option value="courses">My Quests</option>
                    <option value="profile">My Profile</option>
                </optgroup>
                <optgroup label="📚 Learning">
                    <option value="course-detail">Course Detail</option>
                    <option value="module-view">Module View</option>
                    <option value="lesson">Lesson Video</option>
                    <option value="lesson-progress">Lesson Progress</option>
                </optgroup>
                <optgroup label="✏️ Activities">
                    <option value="flashcards">Flashcards</option>
                    <option value="drag-drop" selected>Drag &amp; Drop</option>
                    <option value="quiz">Quiz</option>
                </optgroup>
                <optgroup label="📝 Homework">
                    <option value="homework">Homework Submit</option>
                    <option value="homework-feedback">Homework Feedback</option>
                </optgroup>
                <optgroup label="🌟 Progress &amp; Support">
                    <option value="progress">My Progress</option>
                    <option value="chat">Mentor Chat</option>
                    <option value="certificate">Certificate</option>
                    <option value="payment">Payment</option>
                </optgroup>
                <optgroup label="🎓 Mentor">
                    <option value="mentor-dashboard">Mentor Dashboard</option>
                    <option value="mentor-review">Give Feedback</option>
                </optgroup>
            </select>
            <a href="../../mobile-app/auth/login.html" class="btn-app-link">Adult App</a>
            <a href="../../admin-dashboard/index.html" class="btn-admin-link">Admin Panel</a>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const answers = ['Sheen (Sh)', 'Saad (S)', 'Daad (D)'];
        const slots = document.querySelectorAll('.drop-zone-slot');
        let placed = 0;
        function placeItem(el, idx) {
            const targetSlot = slots[idx]; // 0-based but first is already filled
            if (targetSlot.textContent === 'Drop here') {
                targetSlot.textContent = el.textContent;
                targetSlot.style.background = '#d1fae5';
                targetSlot.style.borderColor = 'var(--color-correct)';
                targetSlot.style.color = '#065f46';
                el.style.opacity = '0.4';
                el.style.pointerEvents = 'none';
                placed++;
            }
        }
        function checkAnswers() {
            document.querySelectorAll('.drop-zone').forEach((zone, i) => {
                if (i > 0) zone.classList.add('correct');
            });
            document.getElementById('feedback-msg').style.display = 'block';
        }
    </script>
</body>
</html>
