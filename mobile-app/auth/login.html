<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Login - Islamic Learning Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="prototype-container">
        <div class="mobile-frame">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="icons">
                    <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4" y="4" width="3" height="7" rx="0.5"/><rect x="8" y="2" width="3" height="9" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
                    <svg width="16" height="11" viewBox="0 0 16 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 9.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" stroke="none"/><path d="M4.5 7A5 5 0 0111.5 7" stroke-linecap="round"/><path d="M1.5 4.5A9 9 0 0114.5 4.5" stroke-linecap="round"/></svg>
                    <span style="font-size:12px;font-weight:600">100%</span>
                </div>
            </div>

            <div id="login" class="screen active">
                <div class="screen-content">
                    <div class="login-container">
                        <div class="app-icon"><img src="../../assets/logo-noname.png" alt="ILP Logo" style="width:60px;height:60px;object-fit:contain;"></div>
                        <div class="welcome-title">Welcome Back</div>
                        <div class="welcome-subtitle">Sign in to continue your Islamic journey</div>

                        <div class="form-container">
                            <div class="form-group">
                                <label class="form-label">Email / Phone</label>
                                <input type="text" class="form-input" placeholder="Enter your email or phone">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-input" placeholder="Enter password">
                            </div>

                            <div class="form-footer">
                                <label class="checkbox-label">
                                    <input type="checkbox">
                                    <span>Remember me</span>
                                </label>
                                <a href="#" class="forgot-link">Forgot Password?</a>
                            </div>

                            <button class="btn-primary" onclick="showScreen('dashboard')">Sign In</button>

                            <div class="register-link">
                                New to the platform?
                                <a href="#" onclick="showScreen('register'); return false;">Create Account</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen-navigation">
            <div class="nav-title">Navigate Screens</div>
            <select class="nav-dropdown" id="screenSelector" onchange="showScreen(this.value)">
                <optgroup label="🔐 Auth &amp; Onboarding">
                    <option value="login" selected>Login</option>
                    <option value="register">Register</option>
                    <option value="onboarding">Onboarding</option>
                </optgroup>
                <optgroup label="👤 Student Dashboard">
                    <option value="dashboard">Dashboard</option>
                    <option value="courses">Course Library</option>
                    <option value="profile">Profile</option>
                </optgroup>
                <optgroup label="📚 Learning Flow">
                    <option value="course-detail">Course Detail</option>
                    <option value="module-view">Module View</option>
                    <option value="lesson">Lesson Video</option>
                    <option value="lesson-progress">Lesson Progress</option>
                </optgroup>
                <optgroup label="✏️ Activities">
                    <option value="flashcards">Flashcards</option>
                    <option value="drag-drop">Drag &amp; Drop</option>
                    <option value="quiz">Quiz</option>
                </optgroup>
                <optgroup label="📝 Homework &amp; Review">
                    <option value="homework">Homework Submit</option>
                    <option value="homework-feedback">Homework Feedback</option>
                </optgroup>
                <optgroup label="💬 Support &amp; Extras">
                    <option value="progress">Progress &amp; Stats</option>
                    <option value="chat">Mentor Chat</option>
                    <option value="certificate">Certificate</option>
                    <option value="payment">Payment</option>
                </optgroup>
                <optgroup label="🎓 Mentor/Admin">
                    <option value="mentor-dashboard">Mentor Dashboard</option>
                    <option value="mentor-review">Give Feedback</option>
                </optgroup>
            </select>
            <a href="../../kids-app/auth/login.html" class="btn-app-link">🧒 Kids App</a>
            <a href="../../admin-dashboard/index.html" class="btn-admin-link">🔧 Admin Panel</a>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
