<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Islamic Learning Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="prototype-container">
        <div class="mobile-frame">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="icons">
                    <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4" y="4" width="3" height="7" rx="0.5"/><rect x="8" y="2" width="3" height="9" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
                    <span style="font-size:12px;font-weight:600">100%</span>
                </div>
            </div>

            <div id="login" class="screen active">
                <div class="screen-content no-pad">
                    <div class="login-hero">
                        <div class="login-logo-box"><img src="../../assets/logo.png" style="width:80px;height:80px;object-fit:contain;border-radius:20px;"></div>
                        <div class="login-hero-title">Islamic Learning Platform</div>
                        <div class="login-hero-sub">Continue your journey of knowledge</div>
                    </div>

                    <div class="login-body">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="your@email.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" placeholder="••••••••">
                        </div>

                        <div class="login-opts-row">
                            <label class="login-remember">
                                <input type="checkbox" checked>
                                <span>Remember me</span>
                            </label>
                            <a class="login-fp" href="#">Forgot password?</a>
                        </div>

                        <button class="btn-primary" onclick="showScreen('dashboard')">Sign In</button>

                        <div class="or-divider">
                            <div class="or-line"></div>
                            <span class="or-text">or continue with</span>
                            <div class="or-line"></div>
                        </div>

                        <div class="social-row">
                            <button class="social-btn" onclick="showScreen('dashboard')">
                                <span class="social-ico"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg></span>
                                Google
                            </button>
                            <button class="social-btn" onclick="showScreen('dashboard')">
                                <span class="social-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></span>
                                Facebook
                            </button>
                        </div>

                        <div class="register-row">
                            New here? <a href="#" onclick="showScreen('register'); return false;">Create account</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen-navigation">
            <div class="nav-title">Navigate <span>Screens</span></div>
            <select class="nav-dropdown" id="screenSelector" onchange="showScreen(this.value)">
                <optgroup label="🔐 Auth &amp; Onboarding">
                    <option value="login" selected>Login</option>
                    <option value="register">Register</option>
                    <option value="onboarding">Onboarding</option>
                    <option value="password-reset">Password Reset</option>
                </optgroup>
                <optgroup label="👤 Student Dashboard">
                    <option value="dashboard">Dashboard</option>
                    <option value="courses">Course Library</option>
                    <option value="profile">Profile</option>
                </optgroup>
                <optgroup label="📚 Learning Flow">
                    <option value="course-detail">Course Detail</option>
                    <option value="module-view">Module View</option>
                    <option value="lesson">Lesson Video</option>
                    <option value="lesson-progress">Lesson Progress</option>
                    <option value="live-session">Live Session</option>
                    <option value="notes">Notes</option>
                </optgroup>
                <optgroup label="✏️ Activities">
                    <option value="flashcards">Flashcards</option>
                    <option value="drag-drop">Drag &amp; Drop</option>
                    <option value="quiz">Quiz</option>
                    <option value="reflection">Reflection</option>
                    <option value="audio-recording">Audio Recording</option>
                </optgroup>
                <optgroup label="📝 Homework &amp; Review">
                    <option value="homework">Homework Submit</option>
                    <option value="homework-feedback">Homework Feedback</option>
                </optgroup>
                <optgroup label="💬 Support &amp; Extras">
                    <option value="progress">Progress &amp; Stats</option>
                    <option value="chat">Mentor Chat</option>
                    <option value="certificate">Certificate</option>
                    <option value="payment">Payment</option>
                    <option value="subscription">Subscription</option>
                </optgroup>
                <optgroup label="🎓 Mentor/Admin">
                    <option value="mentor-dashboard">Mentor Dashboard</option>
                    <option value="mentor-review">Give Feedback</option>
                    <option value="mentor-profile">Mentor Profile</option>
                </optgroup>
            </select>
            <a href="../../kids-app/auth/login.html" class="btn-app-link">🧒 Kids App</a>
            <a href="../../admin-dashboard/index.html" class="btn-admin-link">🔧 Admin Panel</a>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
